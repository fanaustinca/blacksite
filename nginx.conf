server {
    listen 8080;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/javascript application/javascript text/css image/svg+xml application/json;

    location / {
        try_files $uri $uri/ =404;
    }

    location /vendor/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
